# Геометрия разрезки кадра на спектральные каналы.
#
# ВНИМАНИЕ: соответствие "тайл -> длина волны" — предварительное (заглушка).
# Его нужно откалибровать на реальных данных, сверившись со штатным ПО MultiCam.
# Здесь сетка 4x4 (16 тайлов 512x512), индексы тайлов: 0..15 по строкам
# (слева-направо, сверху-вниз).

grid_rows: 4
grid_cols: 4

# длина волны (нм) -> индекс тайла в сетке
tile_of_wavelength:
  400: 0
  450: 1
  500: 2
  550: 3
  600: 4
  650: 5
  700: 6
  750: 7
  800: 8    # опорный канал (единичная матрица в calibration*.txt)
  850: 9
  900: 10
  950: 11
